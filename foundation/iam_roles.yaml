# Foundation Layer IAM Roles
# Use this file to manage roles for future service accounts (e.g., infra-runner).
# Roles for the foundation-runner itself are now managed in the bootstrap layer.

org_roles:
#  - roles/resourcemanager.folderAdmin
#  - roles/resourcemanager.projectCreator
#  - roles/orgpolicy.policyAdmin
#  - roles/logging.configWriter

project_iam_bindings:
  - project: app-backend-nonprod
    roles:
      - roles/compute.instanceAdmin.v1
      - roles/run.admin
    members:
      - "serviceAccount:app-sa@ingr-app-backend-nonprod.iam.gserviceaccount.com"

  - project: nonprod-host
    roles:
      - roles/container.hostServiceAgentUser
    members:
      - "serviceAccount:service-890886578244@container-engine-robot.iam.gserviceaccount.com"

subnetwork_iam_bindings:
  - project: nonprod-host
    region: asia-south1
    subnetwork: nonprod-subnet-asia-south1
    roles:
      - roles/compute.networkUser
    members: 
      - "serviceAccount:service-890886578244@compute-system.iam.gserviceaccount.com"
      - "serviceAccount:service-890886578244@container-engine-robot.iam.gserviceaccount.com"
      - "serviceAccount:890886578244@cloudservices.gserviceaccount.com"
      - "serviceAccount:terraform-runner@ingr-seed-project.iam.gserviceaccount.com"