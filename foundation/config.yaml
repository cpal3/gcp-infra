# Foundation Configuration
# Drive folders, projects, APIs, and Organization Policies from this file.

folders:
  - prod
  - non-prod
  - common
  - bootstrap

logging:
  project: logging
  log_bucket_id: org-central-logs
  retention_days: 30
  sink_name: org-central-sink
  filter: ""                          # empty = all logs (admin activity, system events, etc.)

  gcs:
    enabled: false
    location: asia-south1
    retention_days: 365               # 1-year archive for compliance

# bigquery:                           # Reserved for future log analytics
#   dataset_id: org_logs
#   location: asia-south1

projects:
  hub-net:
    folder: common
    environment: common
    cost_center: "1001-it"
    business_unit: "platform-engineering"
    apis:
      - compute.googleapis.com
      - servicenetworking.googleapis.com
      - dns.googleapis.com
  logging:
    folder: common
    environment: common
    cost_center: "1001-it"
    business_unit: "platform-engineering"
    apis:
      - logging.googleapis.com
      - bigquery.googleapis.com
      - storage.googleapis.com
#  prod-host1:
#    folder: prod
#    environment: prod
#    apis:
#      - compute.googleapis.com
#      - container.googleapis.com
  nonprod-host:
    folder: non-prod
    environment: non-prod
    cost_center: "1001-it"
    business_unit: "platform-engineering"
    apis:
      - compute.googleapis.com
      - container.googleapis.com
      - servicenetworking.googleapis.com
  app-backend-nonprod:
    folder: non-prod
    environment: non-prod
    cost_center: "2045-hr"
    business_unit: "human-resources"
    apis:
      - compute.googleapis.com
      - container.googleapis.com
      - sqladmin.googleapis.com
      - servicenetworking.googleapis.com
      - run.googleapis.com
      - compute.googleapis.com

org_policies:
  - constraint: constraints/iam.disableServiceAccountKeyCreation
    enforce: true
  - constraint: constraints/compute.vmExternalIpAccess
    enforce: true
    is_list: true # Boolean vs List policy handling
  - constraint: constraints/compute.skipDefaultNetworkCreation
    enforce: true

# VPC Network Configuration
# IP Allocation is driven sequentially by the Dynamic IPAM script logic from ipam.csv 
# Master Range for all environments: 10.1.0.0/16 (split per Environment Tier Base Blocks)

vpcs:
  hub-vpc:
    project: hub-net
    routing_mode: REGIONAL
    enable_shared_vpc_host: false
    enable_flow_logs: true
    subnets:
      - name: hub-subnet-asia-south1
        cidr: 10.1.0.0/22
        region: asia-south1
    firewall_rules:
      - name: deny-all-ingress
        direction: INGRESS
        priority: 65534
        deny:
          - protocol: all
        source_ranges:
          - "0.0.0.0/0"
      # allow-iap-ssh intentionally omitted: hub hosts Palo Alto NVA (managed via Panorama/HTTPS)
      # and DNS peering only. PA-specific management rules will be added at NVA deployment time.
      - name: allow-internal
        direction: INGRESS
        priority: 1000
        allow:
          - protocol: all
        source_ranges:
          - "10.1.0.0/22"       # hub-vpc primary range

