  nonprod-vpc:
    project: nonprod-host
    routing_mode: REGIONAL
    enable_shared_vpc_host: true
    enable_flow_logs: true
    subnets:
      - name: nonprod-subnet-asia-south1
        cidr: 10.1.128.0/24
        region: asia-south1
        secondary_ranges:
          - name: gke-pods
            cidr: 10.1.136.0/21
          - name: gke-services
            cidr: 10.1.129.0/25
      # - name: test-subnet-asia-south1
      #   cidr: 10.1.144.0/24
      #   region: asia-south1
      - name: nonprod-proxy-subnet-asia-south1
        cidr: 10.1.160.0/23
        region: asia-south1
        purpose: REGIONAL_MANAGED_PROXY
        private_ip_google_access: false
        role: ACTIVE
    private_service_access_configs:
      - name: "google-managed-services-nonprod-vpc"
        address: "10.1.152.0"
        prefix_length: 21
    firewall_rules:
      - name: deny-all-ingress
        direction: INGRESS
        priority: 65534
        deny:
          - protocol: all
        source_ranges:
          - "0.0.0.0/0"
      - name: allow-iap-ssh
        direction: INGRESS
        priority: 1000
        allow:
          - protocol: tcp
            ports: ["22"]
        source_ranges:
          - "35.235.240.0/20"   # GCP Identity-Aware Proxy range
        target_tags:
          - iap-ssh
      - name: allow-internal
        direction: INGRESS
        priority: 1000
        allow:
          - protocol: all
        source_ranges:
          - "10.1.128.0/24"     # nonprod primary subnet
          - "10.1.144.0/24"     # test subnet

# VPC Peering (Hub-and-Spoke)
peerings:
#  - name: hub-to-prod
#    network: hub-vpc
#    peer_network: prod-vpc
#    export_custom_routes: true
#    import_custom_routes: true
  
  - name: hub-to-nonprod
    network: hub-vpc
    peer_network: nonprod-vpc
    export_custom_routes: true
    import_custom_routes: true

# Project Attachments
# Attaches service projects to Shared VPCs and grants Subnet access
project_attachments:
  - service_project: app-backend-nonprod
    host_project: nonprod-host
    subnetwork: nonprod-subnet-asia-south1
    region: asia-south1

service_accounts:
  - project: app-backend-nonprod
    account_id: app-sa
    display_name: "App Backend Service Account"
