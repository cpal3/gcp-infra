name: Apps Pipeline (Build & Deploy)

on:
  workflow_dispatch: # Manual trigger for testing
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/apps-pipeline.yaml'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: "ingr-app-backend-nonprod"
  REGION: "asia-south1"
  GKE_ZONE: "asia-south1-a"
  CLUSTER_NAME: "ingr-gke-private-nonprod"
  AR_REPO_NAME: "ingr-app-repo"
  SERVICE_NAME: "my-app"
  IMAGE_NAME: "my-app-image"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/671995239099/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'terraform-runner@ingr-seed-project.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG ./app
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Get GKE Credentials (Connect Gateway)
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.PROJECT_ID }}
          use_connect_gateway: true # IMPORTANT: Use Connect Gateway for private cluster access

      - name: Deploy to GKE
        run: |
          mkdir -p .k8s-manifests
          for f in k8s/*.yaml; do
            envsubst < $f > .k8s-manifests/$(basename $f)
          done
          kubectl apply -f .k8s-manifests/
