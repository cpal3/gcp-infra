# Terraform Infra-pipeline Workflow
# Manages the GKE clusters and application infrastructure.

name: "Terraform Infra-pipeline"

concurrency:
  group: terraform-infra-pipeline
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - 'Infra-pipeline/**'
      - 'modules/gke/**'
      - 'common.auto.tfvars'
      - 'provider_versions.tf'
  pull_request:
    branches:
      - main
    paths:
      - 'Infra-pipeline/**'
      - 'modules/gke/**'
      - 'common.auto.tfvars'
      - 'provider_versions.tf'
  workflow_dispatch:

jobs:
  Infra-pipeline:
    name: "Infra-pipeline"
    permissions:
      contents: 'read'
      id-token: 'write'
    uses: ./.github/workflows/terraform-module.yaml
    with:
      directory: 'Infra-pipeline'
      environment: 'Infra-pipeline'
      service_account: 'foundation-runner@ingr-seed-project.iam.gserviceaccount.com'
    secrets:
      ORG_ID: ${{ secrets.TF_VAR_ORG_ID }}
      BILLING_ACCOUNT: ${{ secrets.TF_VAR_BILLING_ACCOUNT }}
      PROJECT_NAME: ${{ secrets.TF_VAR_PROJECT_NAME }}
      REGION: ${{ secrets.TF_VAR_REGION }}
      GITHUB_REPO: ${{ secrets.TF_VAR_GITHUB_REPO }}
