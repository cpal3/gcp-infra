name: Helm Pipeline (Deploy Simple App)

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'helm-charts/**'
      - '.github/workflows/helm-pipeline.yaml'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: "ingr-app-backend-nonprod"
  REGION: "asia-south1"
  GKE_ZONE: "asia-south1-a"
  CLUSTER_NAME: "ingr-gke-private-nonprod"
  RELEASE_NAME: "simple-app"
  CHART_PATH: "./helm-charts/simple-app"

jobs:
  deploy-helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/671995239099/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'terraform-runner@ingr-seed-project.iam.gserviceaccount.com'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE Credentials (Connect Gateway)
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.PROJECT_ID }}
          use_connect_gateway: true

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy Helm Chart
        run: |
          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            --namespace default \
            --wait --timeout 5m
